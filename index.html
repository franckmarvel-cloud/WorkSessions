<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My People - Personal CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf8f5;
      --surface: #ffffff;
      --surface-hover: #f5f0eb;
      --border: #e8e0d8;
      --text: #2d2a26;
      --text-soft: #6b6560;
      --text-muted: #9b9490;
      --accent: #e07850;
      --accent-hover: #c8683f;
      --accent-light: #fef0ea;
      --purple: #7c6bce;
      --purple-light: #f0eefa;
      --green: #5ba87a;
      --green-light: #eaf6ef;
      --danger: #d94848;
      --danger-light: #fdeaea;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
      --radius: 14px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #e07850 0%, #c8683f 100%);
      color: white;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
    }

    header .logo {
      font-size: 2.2rem;
      margin-bottom: 0.3rem;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      opacity: 0.85;
      font-size: 0.95rem;
      margin-top: 0.3rem;
      font-weight: 400;
    }

    /* Container */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    /* Add Button - Big and Friendly */
    .add-section {
      margin-top: -1.5rem;
      margin-bottom: 1rem;
    }

    .btn-add {
      width: 100%;
      padding: 1rem;
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
      font-family: inherit;
      box-shadow: var(--shadow-sm);
    }

    .btn-add:hover {
      background: var(--accent-light);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .btn-add .plus-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 400;
      line-height: 1;
    }

    /* Search */
    .search-section {
      margin-bottom: 1rem;
    }

    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
    }

    .search-box {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .search-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .search-box::placeholder {
      color: var(--text-muted);
    }

    /* Stats & Data Actions */
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      padding: 0 0.25rem;
    }

    .stats {
      font-size: 0.85rem;
      color: var(--text-soft);
      font-weight: 500;
    }

    .data-actions {
      display: flex;
      gap: 0.35rem;
    }

    .btn-tiny {
      padding: 0.35rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text-soft);
      font-size: 0.78rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-tiny:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    /* Contact Cards */
    .contacts {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      padding-bottom: 3rem;
    }

    .contact-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
      position: relative;
    }

    .contact-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .contact-card:active {
      transform: translateY(0);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 0.5rem;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.05rem;
      color: white;
      flex-shrink: 0;
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-weight: 650;
      font-size: 1.05rem;
      color: var(--text);
      line-height: 1.3;
    }

    .card-meta {
      font-size: 0.82rem;
      color: var(--text-muted);
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 0.15rem;
    }

    .card-meta span {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .card-story {
      font-size: 0.88rem;
      color: var(--text-soft);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-top: 0.35rem;
    }

    .card-tags {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .tag {
      padding: 0.2rem 0.6rem;
      background: var(--purple-light);
      color: var(--purple);
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 3.5rem 1.5rem;
    }

    .empty-state .illustration {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    .empty-state h2 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      font-size: 0.95rem;
      color: var(--text-soft);
      line-height: 1.5;
      max-width: 320px;
      margin: 0 auto;
    }

    /* Buttons */
    .btn {
      padding: 0.7rem 1.4rem;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(224, 120, 80, 0.3);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 12px rgba(224, 120, 80, 0.4);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1.5px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--surface-hover);
      border-color: var(--text-muted);
    }

    .btn-danger {
      background: var(--danger-light);
      color: var(--danger);
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }

    .btn-danger:hover {
      background: #f9d4d4;
    }

    .btn-sm {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }

    /* Modal Overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(45, 42, 38, 0.4);
      backdrop-filter: blur(6px);
      z-index: 100;
      justify-content: center;
      align-items: start;
      padding: 3vh 1rem;
      overflow-y: auto;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: 18px;
      width: 100%;
      max-width: 500px;
      padding: 2rem;
      animation: modalIn 0.25s ease;
      box-shadow: var(--shadow-lg);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-soft);
      margin-bottom: 0.4rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
      background: white;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: var(--text-muted);
    }

    .form-group textarea {
      min-height: 90px;
      resize: vertical;
      line-height: 1.5;
    }

    .form-hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.75rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .modal-actions .right {
      display: flex;
      gap: 0.5rem;
    }

    /* Detail View */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(45, 42, 38, 0.4);
      backdrop-filter: blur(6px);
      z-index: 100;
      justify-content: center;
      align-items: start;
      padding: 3vh 1rem;
      overflow-y: auto;
    }

    .detail-overlay.active {
      display: flex;
    }

    .detail-panel {
      background: var(--surface);
      border-radius: 18px;
      width: 100%;
      max-width: 540px;
      padding: 2rem;
      animation: modalIn 0.25s ease;
      box-shadow: var(--shadow-lg);
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .detail-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.3rem;
      color: white;
      flex-shrink: 0;
    }

    .detail-header h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0;
    }

    .detail-field {
      margin-bottom: 1.15rem;
      padding: 0.85rem 1rem;
      background: var(--bg);
      border-radius: var(--radius-sm);
    }

    .detail-field .label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    .detail-field .value {
      font-size: 0.92rem;
      line-height: 1.55;
      white-space: pre-wrap;
      color: var(--text);
    }

    .detail-field .value.empty {
      color: var(--text-muted);
      font-style: italic;
    }

    .detail-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .detail-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    /* Encounters */
    .encounters-section {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .encounters-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.85rem;
    }

    .encounters-header h3 {
      font-size: 0.95rem;
      font-weight: 650;
      color: var(--text);
    }

    .encounter-item {
      background: var(--green-light);
      border: 1px solid #d0e8da;
      border-radius: var(--radius-sm);
      padding: 0.85rem 1rem;
      margin-bottom: 0.5rem;
    }

    .encounter-item .encounter-date {
      font-size: 0.78rem;
      color: var(--green);
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .encounter-item .encounter-said {
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--text);
    }

    .no-encounters {
      color: var(--text-muted);
      font-size: 0.88rem;
      font-style: italic;
      padding: 0.5rem 0;
    }

    /* Mobile */
    @media (max-width: 600px) {
      header { padding: 2rem 1.25rem 1.5rem; }
      header h1 { font-size: 1.4rem; }
      .container { padding: 0 1rem; }
      .modal, .detail-panel { padding: 1.5rem; }
      .card-top { gap: 0.7rem; }
      .avatar { width: 40px; height: 40px; font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">&#128203;</div>
    <h1>My People</h1>
    <p>Remember every person you meet</p>
  </header>

  <div class="container">
    <div class="add-section">
      <button class="btn-add" onclick="openAddModal()">
        <span class="plus-icon">+</span>
        I just met someone new!
      </button>
    </div>

    <div class="search-section">
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" class="search-box" id="searchBox" placeholder="Search by name, story, or who introduced you...">
      </div>
    </div>

    <div class="info-bar">
      <div class="stats" id="stats"></div>
      <div class="data-actions">
        <button class="btn-tiny" onclick="exportData()">&#128190; Save backup</button>
        <button class="btn-tiny" onclick="document.getElementById('importFile').click()">&#128194; Load backup</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </div>

    <div class="contacts" id="contactList"></div>
  </div>

  <!-- Add/Edit Contact Modal -->
  <div class="modal-overlay" id="contactModal">
    <div class="modal">
      <h2 id="modalTitle">I just met someone!</h2>
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>What's their name?</label>
        <input type="text" id="fieldName" placeholder="e.g. Sarah Chen">
      </div>
      <div class="form-group">
        <label>When did you meet?</label>
        <input type="date" id="fieldDate">
      </div>
      <div class="form-group">
        <label>Who introduced you?</label>
        <input type="text" id="fieldIntroducedBy" placeholder="e.g. My friend Alex, at a dinner party">
        <div class="form-hint">Leave blank if you met on your own</div>
      </div>
      <div class="form-group">
        <label>Their story</label>
        <textarea id="fieldStory" placeholder="What do they do? Where are they from? What's interesting about them?"></textarea>
      </div>
      <div class="form-group">
        <label>What did they say?</label>
        <textarea id="fieldSaid" placeholder="Anything memorable they mentioned..."></textarea>
      </div>
      <div class="form-group">
        <label>Tags</label>
        <input type="text" id="fieldTags" placeholder="e.g. designer, NYC, coffee lover">
        <div class="form-hint">Separate with commas to help you find them later</div>
      </div>
      <div class="modal-actions">
        <div>
          <button class="btn btn-danger" id="deleteBtn" onclick="deleteContact()" style="display:none">Remove</button>
        </div>
        <div class="right">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveContact()">Save this person</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Contact Detail View -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-panel" id="detailPanel"></div>
  </div>

  <!-- Add Encounter Modal -->
  <div class="modal-overlay" id="encounterModal">
    <div class="modal">
      <h2>I saw them again!</h2>
      <input type="hidden" id="encContactId">
      <div class="form-group">
        <label>When?</label>
        <input type="date" id="encDate">
      </div>
      <div class="form-group">
        <label>What happened?</label>
        <textarea id="encNotes" placeholder="What did you talk about? What did they share? How was the meeting?" style="min-height:120px"></textarea>
      </div>
      <div class="modal-actions">
        <div></div>
        <div class="right">
          <button class="btn btn-secondary" onclick="closeEncounterModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveEncounter()">Save encounter</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Color palette for avatars
    const COLORS = ['#e07850','#7c6bce','#5ba87a','#d4a843','#c75b8e','#5b8ec7','#8b6b4a','#6bae9e'];

    function getColor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return COLORS[Math.abs(hash) % COLORS.length];
    }

    function getInitials(name) {
      return name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
    }

    // Data layer
    function getContacts() {
      return JSON.parse(localStorage.getItem('crm_contacts') || '[]');
    }

    function saveContacts(contacts) {
      localStorage.setItem('crm_contacts', JSON.stringify(contacts));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    // Render
    function render() {
      const contacts = getContacts();
      const query = document.getElementById('searchBox').value.toLowerCase();

      const filtered = contacts.filter(c => {
        if (!query) return true;
        return (
          c.name.toLowerCase().includes(query) ||
          (c.story || '').toLowerCase().includes(query) ||
          (c.introducedBy || '').toLowerCase().includes(query) ||
          (c.said || '').toLowerCase().includes(query) ||
          (c.tags || []).some(t => t.toLowerCase().includes(query))
        );
      });

      filtered.sort((a, b) => new Date(b.dateMet || b.createdAt) - new Date(a.dateMet || a.createdAt));

      const list = document.getElementById('contactList');
      const stats = document.getElementById('stats');

      stats.textContent = `${contacts.length} person${contacts.length !== 1 ? 's' : ''} remembered${query ? ` \u00b7 ${filtered.length} found` : ''}`;

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="illustration">${query ? '\ud83d\udd0d' : '\ud83e\udd1d'}</div>
            <h2>${query ? 'Nobody matches that search' : 'Your people list is empty'}</h2>
            <p>${query ? 'Try different words or check the spelling' : 'Tap the button above next time you meet someone interesting!'}</p>
          </div>
        `;
        return;
      }

      list.innerHTML = filtered.map(c => {
        const encounterCount = (c.encounters || []).length;
        const color = getColor(c.name);
        return `
          <div class="contact-card" onclick="openDetail('${c.id}')">
            <div class="card-top">
              <div class="avatar" style="background:${color}">${getInitials(c.name)}</div>
              <div class="card-info">
                <div class="card-name">${escapeHtml(c.name)}</div>
                <div class="card-meta">
                  ${c.dateMet ? `<span>\ud83d\udcc5 ${formatDate(c.dateMet)}</span>` : ''}
                  ${c.introducedBy ? `<span>\ud83d\udc64 Via ${escapeHtml(c.introducedBy)}</span>` : ''}
                  ${encounterCount ? `<span>\ud83d\udd04 ${encounterCount} encounter${encounterCount > 1 ? 's' : ''}</span>` : ''}
                </div>
              </div>
            </div>
            ${c.story ? `<div class="card-story">${escapeHtml(c.story)}</div>` : ''}
            ${c.tags && c.tags.length ? `
              <div class="card-tags">${c.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    // Modal: Add/Edit
    function openAddModal() {
      document.getElementById('modalTitle').textContent = 'I just met someone!';
      document.getElementById('editId').value = '';
      document.getElementById('fieldName').value = '';
      document.getElementById('fieldDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('fieldIntroducedBy').value = '';
      document.getElementById('fieldStory').value = '';
      document.getElementById('fieldSaid').value = '';
      document.getElementById('fieldTags').value = '';
      document.getElementById('deleteBtn').style.display = 'none';
      document.getElementById('contactModal').classList.add('active');
      setTimeout(() => document.getElementById('fieldName').focus(), 100);
    }

    function openEditModal(id) {
      const contacts = getContacts();
      const c = contacts.find(x => x.id === id);
      if (!c) return;

      document.getElementById('modalTitle').textContent = 'Edit this person';
      document.getElementById('editId').value = c.id;
      document.getElementById('fieldName').value = c.name;
      document.getElementById('fieldDate').value = c.dateMet || '';
      document.getElementById('fieldIntroducedBy').value = c.introducedBy || '';
      document.getElementById('fieldStory').value = c.story || '';
      document.getElementById('fieldSaid').value = c.said || '';
      document.getElementById('fieldTags').value = (c.tags || []).join(', ');
      document.getElementById('deleteBtn').style.display = 'inline-flex';
      document.getElementById('contactModal').classList.add('active');
      closeDetail();
    }

    function closeModal() {
      document.getElementById('contactModal').classList.remove('active');
    }

    function saveContact() {
      const name = document.getElementById('fieldName').value.trim();
      if (!name) {
        document.getElementById('fieldName').style.borderColor = 'var(--danger)';
        document.getElementById('fieldName').focus();
        return;
      }

      const contacts = getContacts();
      const editId = document.getElementById('editId').value;
      const tagsRaw = document.getElementById('fieldTags').value;
      const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

      if (editId) {
        const idx = contacts.findIndex(c => c.id === editId);
        if (idx !== -1) {
          contacts[idx].name = name;
          contacts[idx].dateMet = document.getElementById('fieldDate').value;
          contacts[idx].introducedBy = document.getElementById('fieldIntroducedBy').value.trim();
          contacts[idx].story = document.getElementById('fieldStory').value.trim();
          contacts[idx].said = document.getElementById('fieldSaid').value.trim();
          contacts[idx].tags = tags;
          contacts[idx].updatedAt = new Date().toISOString();
        }
      } else {
        contacts.push({
          id: generateId(),
          name,
          dateMet: document.getElementById('fieldDate').value,
          introducedBy: document.getElementById('fieldIntroducedBy').value.trim(),
          story: document.getElementById('fieldStory').value.trim(),
          said: document.getElementById('fieldSaid').value.trim(),
          tags,
          encounters: [],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
        });
      }

      saveContacts(contacts);
      closeModal();
      render();
    }

    function deleteContact() {
      const editId = document.getElementById('editId').value;
      if (!editId) return;
      if (!confirm('Are you sure you want to remove this person?')) return;

      const contacts = getContacts().filter(c => c.id !== editId);
      saveContacts(contacts);
      closeModal();
      render();
    }

    // Detail view
    function openDetail(id) {
      const contacts = getContacts();
      const c = contacts.find(x => x.id === id);
      if (!c) return;

      const encounters = (c.encounters || []).sort((a, b) => new Date(b.date) - new Date(a.date));
      const color = getColor(c.name);

      document.getElementById('detailPanel').innerHTML = `
        <div class="detail-header">
          <div class="detail-avatar" style="background:${color}">${getInitials(c.name)}</div>
          <div>
            <h2>${escapeHtml(c.name)}</h2>
            ${c.dateMet ? `<div style="font-size:0.85rem;color:var(--text-muted);margin-top:0.15rem">\ud83d\udcc5 Met ${formatDate(c.dateMet)}</div>` : ''}
          </div>
        </div>

        ${c.tags && c.tags.length ? `
          <div class="detail-tags">${c.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
        ` : ''}

        <div class="detail-field">
          <div class="label">Introduced by</div>
          <div class="value ${!c.introducedBy ? 'empty' : ''}">${c.introducedBy ? escapeHtml(c.introducedBy) : 'Not recorded'}</div>
        </div>
        <div class="detail-field">
          <div class="label">Their story</div>
          <div class="value ${!c.story ? 'empty' : ''}">${c.story ? escapeHtml(c.story) : 'Not recorded'}</div>
        </div>
        <div class="detail-field">
          <div class="label">What they said</div>
          <div class="value ${!c.said ? 'empty' : ''}">${c.said ? escapeHtml(c.said) : 'Not recorded'}</div>
        </div>

        <div class="encounters-section">
          <div class="encounters-header">
            <h3>\ud83d\udcc6 Encounters (${encounters.length})</h3>
            <button class="btn btn-primary btn-sm" onclick="openEncounterModal('${c.id}')">+ I saw them again</button>
          </div>
          ${encounters.length === 0
            ? '<p class="no-encounters">No follow-up encounters yet. Tap the button above when you see them again!</p>'
            : encounters.map(e => `
              <div class="encounter-item">
                <div class="encounter-date">${formatDate(e.date)}</div>
                <div class="encounter-said">${escapeHtml(e.notes)}</div>
              </div>
            `).join('')
          }
        </div>

        <div class="detail-actions">
          <button class="btn btn-secondary btn-sm" onclick="openEditModal('${c.id}')">Edit</button>
          <button class="btn btn-secondary btn-sm" onclick="closeDetail()">Close</button>
        </div>
      `;

      document.getElementById('detailOverlay').classList.add('active');
    }

    function closeDetail() {
      document.getElementById('detailOverlay').classList.remove('active');
    }

    // Encounters
    function openEncounterModal(contactId) {
      document.getElementById('encContactId').value = contactId;
      document.getElementById('encDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('encNotes').value = '';
      document.getElementById('encounterModal').classList.add('active');
      closeDetail();
      setTimeout(() => document.getElementById('encNotes').focus(), 100);
    }

    function closeEncounterModal() {
      document.getElementById('encounterModal').classList.remove('active');
    }

    function saveEncounter() {
      const contactId = document.getElementById('encContactId').value;
      const notes = document.getElementById('encNotes').value.trim();
      if (!notes) { document.getElementById('encNotes').focus(); return; }

      const contacts = getContacts();
      const c = contacts.find(x => x.id === contactId);
      if (!c) return;

      if (!c.encounters) c.encounters = [];
      c.encounters.push({
        id: generateId(),
        date: document.getElementById('encDate').value,
        notes,
      });
      c.updatedAt = new Date().toISOString();

      saveContacts(contacts);
      closeEncounterModal();
      openDetail(contactId);
      render();
    }

    // Export / Import
    function exportData() {
      const data = JSON.stringify(getContacts(), null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `my-people-backup-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (!Array.isArray(imported)) throw new Error('Invalid');

          const existing = getContacts();
          const existingIds = new Set(existing.map(c => c.id));
          let added = 0;

          for (const c of imported) {
            if (!c.id || !c.name) continue;
            if (existingIds.has(c.id)) continue;
            existing.push(c);
            added++;
          }

          saveContacts(existing);
          render();
          alert(`Welcome back! Loaded ${added} new person(s). ${imported.length - added} were already here.`);
        } catch {
          alert('Hmm, that file doesn\u2019t look right. Please use a backup file from this app.');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // Helpers
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // Close modals on backdrop click
    document.getElementById('contactModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.getElementById('detailOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeDetail();
    });
    document.getElementById('encounterModal').addEventListener('click', function(e) {
      if (e.target === this) closeEncounterModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal();
        closeDetail();
        closeEncounterModal();
      }
    });

    // Reset border color on input focus
    document.getElementById('fieldName').addEventListener('focus', function() {
      this.style.borderColor = '';
    });

    document.getElementById('searchBox').addEventListener('input', render);

    render();
  </script>
</body>
</html>
